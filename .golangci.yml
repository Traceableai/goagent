version: "2"
linters:
  default: none
  enable:
    - dupl
    - goconst
    # - gocyclo response wrapper for server handler is too complex
    # - golint
    - govet
    - ineffassign
    #- interfacer
    - lll
    - misspell
    - nakedret
    - unparam
    # Replaces structcheck and varcheck. Available since go 1.20
    - unused
  settings:
    dupl:
      threshold: 400
    gocyclo:
      min-complexity: 25
    lll:
      line-length: 170
  exclusions:
    rules:
      - path: config\/.*.go # constants are generated with underscore in *.pb.go files
        text: don't use underscores in Go names
        linters:
          - golint
formatters:
  enable:
    - gofmt
