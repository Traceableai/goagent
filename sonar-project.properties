# SonarQube Project Configuration
sonar.issue.ignore.multicriteria=e1

# Suppression: Allow string literal duplication in test files (Rule S1192)
# Rationale: Test data and assertion messages often contain repeated strings for clarity and readability.
# Extracting these to constants can reduce test readability.
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

# Exclude test files from Copy-Paste Detection (CPD)
# Rationale: Test setup patterns are intentionally similar for consistency,
# and each test should be independently understandable. Also configs we use to test look very similar
sonar.cpd.exclusions=**/*_test.go

# Go test coverage configuration
sonar.go.coverage.reportPaths=coverage.out

# Exclude test files from coverage calculations (tests themselves don't need coverage)
sonar.coverage.exclusions=**/*_test.go,_tests/**,_examples/**
